<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Aeneas · Sliding Frames | Spotify · Roblox · Netflix</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: #0a0a0a;
            font-family: 'Georgia', serif;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow-x: hidden;
        }

        .container {
            position: relative;
            width: 100%;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: all 0.5s ease;
        }

        .hero {
            text-align: center;
            transition: all 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .title {
            font-size: clamp(4rem, 15vw, 10rem);
            font-weight: bold;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 25%, #f093fb 50%, #f5576c 75%, #fda085 100%);
            background-size: 200% 200%;
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            animation: gradientShift 4s ease infinite;
            letter-spacing: 0.05em;
            transition: all 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            display: inline-block;
        }

        .container.animate .title {
            font-size: 2.2rem !important;
            transform: translate(-35vw, -38vh);
            animation: none;
            background: linear-gradient(135deg, #a8b9ff, #c084fc);
            -webkit-background-clip: text;
            background-clip: text;
            white-space: nowrap;
        }

        .type-wrapper {
            display: inline-flex;
            align-items: baseline;
            white-space: nowrap;
        }

        .cursor {
            display: inline-block;
            width: 4px;
            height: 1em;
            background: linear-gradient(135deg, #f093fb, #f5576c);
            margin-left: 0.1em;
            animation: blink 0.8s infinite;
            vertical-align: text-bottom;
        }

        .subtitle {
            margin-top: 1.5rem;
            font-size: clamp(1.2rem, 4vw, 1.8rem);
            font-family: 'Segoe UI', 'Georgia', cursive;
            font-weight: 500;
            letter-spacing: 0.1em;
            background: linear-gradient(120deg, #f6d365 0%, #fda085 40%, #c471ed 70%, #fbc2eb 100%);
            background-size: 180% 180%;
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            transition: all 0.5s ease;
        }

        .container.animate .subtitle {
            opacity: 0;
            transform: translateY(80px);
            filter: blur(3px);
        }

        .buttons-panel {
            position: fixed;
            bottom: -30%;
            left: 0;
            right: 0;
            display: flex;
            justify-content: center;
            gap: 2rem;
            flex-wrap: wrap;
            padding: 2rem;
            transition: all 0.6s cubic-bezier(0.2, 0.9, 0.4, 1.2);
            z-index: 10;
        }

        .container.animate .buttons-panel {
            bottom: 12%;
        }

        .gradient-btn {
            background: linear-gradient(135deg, #2a1a3a, #1e2a3a, #2a1e3a);
            background-size: 200% 200%;
            border: none;
            border-radius: 60px;
            padding: 0.9rem 2rem;
            min-width: 170px;
            font-size: 1.5rem;
            font-weight: bold;
            font-family: 'Segoe UI', sans-serif;
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 14px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            transition: all 0.2s ease;
            border: 1px solid rgba(255,255,255,0.1);
            animation: btnGradient 3s ease infinite;
        }

        .gradient-btn:hover {
            transform: scale(1.05) translateY(-3px);
            box-shadow: 0 12px 28px rgba(0,0,0,0.5);
            border-color: rgba(255,200,100,0.6);
        }

        @keyframes btnGradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .btn-logo {
            width: 30px;
            height: 30px;
            object-fit: contain;
            filter: drop-shadow(0 0 2px rgba(0,0,0,0.4));
        }

        .hint {
            position: fixed;
            bottom: 20px;
            left: 20px;
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(5px);
            padding: 5px 14px;
            border-radius: 30px;
            font-size: 0.75rem;
            font-family: monospace;
            color: #aaa;
            z-index: 99;
        }

        /* ========== BIG SLIDING FRAME ========== */
        .frame-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 200;
            pointer-events: none;
        }

        .sliding-frame {
            position: relative;
            width: 600px;
            max-width: 85vw;
            min-height: 450px;
            background: #0c0c0c;
            border-radius: 42px;
            padding: 6px;
            box-shadow: 0 30px 50px rgba(0,0,0,0.6);
            transition: transform 0.45s cubic-bezier(0.2, 0.9, 0.3, 1.2), opacity 0.3s ease;
            transform: translateX(-150%);
            opacity: 0;
            pointer-events: none;
        }

        .sliding-frame.active {
            transform: translateX(0) !important;
            opacity: 1;
            pointer-events: auto;
        }

        .sliding-frame.exit {
            transform: translateX(-150%) !important;
            opacity: 0;
            transition: transform 0.4s ease-in, opacity 0.3s;
            pointer-events: none;
        }

        /* Black + White + Pink gradient border */
        .sliding-frame::before {
            content: "";
            position: absolute;
            inset: -4px;
            border-radius: 44px;
            padding: 4px;
            background: linear-gradient(125deg, 
                #000000 0%, 
                #3a3a3a 15%, 
                #faf0f5 35%, 
                #ffb6c1 55%, 
                #ff69b4 75%, 
                #ffffff 100%);
            background-size: 220% 220%;
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            animation: borderFlow 4s ease infinite;
            pointer-events: none;
            border-radius: 44px;
        }

        @keyframes borderFlow {
            0% { background-position: 0% 30%; }
            50% { background-position: 100% 70%; }
            100% { background-position: 0% 30%; }
        }

        .frame-inner {
            background: rgba(8, 8, 12, 0.95);
            backdrop-filter: blur(3px);
            border-radius: 38px;
            padding: 2rem 1.8rem;
            min-height: 430px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 1.2rem;
            border: 1px solid rgba(255,210,180,0.2);
        }

        .frame-logo {
            width: 100px;
            height: 100px;
            object-fit: contain;
            filter: drop-shadow(0 4px 12px rgba(0,0,0,0.6));
            margin-bottom: 0.5rem;
        }

        .frame-title {
            font-size: 2.2rem;
            font-weight: bold;
            background: linear-gradient(145deg, #f3a683, #f7d794, #ffb8d1);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            font-family: 'Segoe UI', monospace;
        }

        .empty-text {
            font-size: 1rem;
            color: #aaa9;
            letter-spacing: 1px;
            font-style: italic;
            border-top: 1px dashed rgba(255,255,200,0.3);
            padding-top: 1rem;
            margin-top: 0.5rem;
        }

        .close-frame-btn {
            position: absolute;
            top: 18px;
            right: 24px;
            background: rgba(0,0,0,0.7);
            border: 1px solid #ffb7c5;
            border-radius: 50px;
            width: 38px;
            height: 38px;
            font-size: 22px;
            font-weight: bold;
            color: #ffb7c5;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.2s;
            z-index: 25;
            backdrop-filter: blur(4px);
        }

        .close-frame-btn:hover {
            background: #ff4d6d;
            color: white;
            transform: scale(1.07);
            border-color: white;
        }

        @media (max-width: 680px) {
            .sliding-frame {
                width: 90vw;
                min-height: 380px;
            }
            .frame-inner {
                padding: 1.2rem;
                min-height: 360px;
            }
            .frame-title {
                font-size: 1.5rem;
            }
            .frame-logo {
                width: 70px;
                height: 70px;
            }
            .gradient-btn {
                padding: 0.6rem 1.2rem;
                min-width: 130px;
                font-size: 1.1rem;
            }
            .container.animate .buttons-panel {
                bottom: 5%;
                gap: 1rem;
            }
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        @keyframes blink {
            0%, 50% { opacity: 1; }
            51%, 100% { opacity: 0; }
        }
    </style>
</head>
<body>
<div class="container" id="container">
    <div class="hero">
        <h1 class="title">
            <span class="type-wrapper">
                <span id="typedText"></span><span class="cursor"></span>
            </span>
        </h1>
        <div class="subtitle" id="subtitle">Made by myself</div>
    </div>

    <div class="buttons-panel" id="buttonsPanel">
        <button class="gradient-btn" id="musicBtn">
            <img class="btn-logo" src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/spotify.svg" alt="spotify">
            Music
        </button>
        <button class="gradient-btn" id="gamesBtn">
            <img class="btn-logo" src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/roblox.svg" alt="roblox">
            Games
        </button>
        <button class="gradient-btn" id="interestsBtn">
            <img class="btn-logo" src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/netflix.svg" alt="netflix">
            Interests
        </button>
    </div>
    <div class="hint">✨ Press Ctrl → Then click any button ✨</div>
</div>

<!-- SLIDING FRAME -->
<div class="frame-overlay" id="frameOverlay">
    <div class="sliding-frame" id="slidingFrame">
        <button class="close-frame-btn" id="closeFrameBtn">✕</button>
        <div class="frame-inner" id="frameInner">
            <!-- content injected dynamically -->
        </div>
    </div>
</div>

<script>
    // ========== TYPING EFFECT ==========
    const fullWord = "Aeneas";
    const typedSpan = document.getElementById("typedText");
    let letterIndex = 0;
    let typingFinished = false;

    function typeLetter() {
        if (letterIndex < fullWord.length) {
            typedSpan.textContent += fullWord[letterIndex];
            letterIndex++;
            setTimeout(typeLetter, 115);
        } else {
            typingFinished = true;
        }
    }
    typeLetter();

    // ========== CTRL ANIMATION ==========
    const container = document.getElementById("container");
    let ctrlPressed = false;

    document.addEventListener("keydown", function(e) {
        if (e.key === "Control" && !ctrlPressed && typingFinished) {
            e.preventDefault();
            ctrlPressed = true;
            container.classList.add("animate");
            
            // tiny particles
            for (let i = 0; i < 15; i++) {
                let p = document.createElement("div");
                p.style.position = "fixed";
                p.style.width = "5px";
                p.style.height = "5px";
                p.style.background = `radial-gradient(circle, #ffc0cb, #f5576c)`;
                p.style.borderRadius = "50%";
                p.style.left = Math.random() * window.innerWidth + "px";
                p.style.top = window.innerHeight - 50 + "px";
                p.style.pointerEvents = "none";
                p.style.zIndex = "999";
                p.style.animation = "particleFloat 0.7s ease-out forwards";
                document.body.appendChild(p);
                setTimeout(() => p.remove(), 700);
            }
        }
    });

    const particleStyle = document.createElement('style');
    particleStyle.textContent = `@keyframes particleFloat { 0% { opacity:0.8; transform: translateY(0); } 100% { opacity:0; transform: translateY(-70px); } }`;
    document.head.appendChild(particleStyle);

    // ========== FRAME LOGIC ==========
    const slidingFrame = document.getElementById("slidingFrame");
    const frameInner = document.getElementById("frameInner");
    const closeBtn = document.getElementById("closeFrameBtn");
    
    let currentFrameType = null;
    let isTransitioning = false;

    // Get content for each frame (EMPTY except logo + subtle placeholder)
    function getFrameContent(type) {
        if (type === 'music') {
            return `
                <img class="frame-logo" src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/spotify.svg" alt="spotify" onerror="this.src='https://upload.wikimedia.org/wikipedia/commons/thumb/8/84/Spotify_icon.svg/512px-Spotify_icon.svg.png'">
                <div class="frame-title">Music</div>
                <div class="empty-text">✦ empty frame ✦</div>
            `;
        } else if (type === 'games') {
            return `
                <img class="frame-logo" src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/roblox.svg" alt="roblox" onerror="this.src='https://static.vecteezy.com/system/resources/previews/023/234/402/non_2x/roblox-logo-icon-free-png.png'">
                <div class="frame-title">Games</div>
                <div class="empty-text">✦ empty frame ✦</div>
            `;
        } else {
            return `
                <img class="frame-logo" src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/netflix.svg" alt="netflix" onerror="this.src='https://upload.wikimedia.org/wikipedia/commons/0/08/Netflix_2015_logo.svg'">
                <div class="frame-title">Interests</div>
                <div class="empty-text">✦ empty frame ✦</div>
            `;
        }
    }

    // Show frame for a specific type (slides in from left)
    function showFrame(type) {
        if (isTransitioning) return;
        
        // If same frame is already visible, do nothing
        if (currentFrameType === type && slidingFrame.classList.contains("active")) {
            return;
        }
        
        // If there's a visible frame, make it exit first
        if (slidingFrame.classList.contains("active")) {
            isTransitioning = true;
            slidingFrame.classList.add("exit");
            slidingFrame.classList.remove("active");
            
            setTimeout(() => {
                // Update content
                frameInner.innerHTML = getFrameContent(type);
                // Remove exit class and add active to slide in
                slidingFrame.classList.remove("exit");
                void slidingFrame.offsetWidth; // force reflow
                slidingFrame.classList.add("active");
                currentFrameType = type;
                isTransitioning = false;
            }, 400);
        } else {
            // No frame visible, just slide in
            frameInner.innerHTML = getFrameContent(type);
            slidingFrame.classList.remove("exit");
            void slidingFrame.offsetWidth;
            slidingFrame.classList.add("active");
            currentFrameType = type;
        }
    }

    // Close/hide the frame
    function hideFrame() {
        if (isTransitioning) return;
        if (!slidingFrame.classList.contains("active")) return;
        
        isTransitioning = true;
        slidingFrame.classList.add("exit");
        slidingFrame.classList.remove("active");
        
        setTimeout(() => {
            currentFrameType = null;
            isTransitioning = false;
        }, 400);
    }

    // Close button handler
    closeBtn.addEventListener("click", function(e) {
        e.stopPropagation();
        hideFrame();
    });

    // ========== BUTTON CLICK HANDLERS ==========
    const musicButton = document.getElementById("musicBtn");
    const gamesButton = document.getElementById("gamesBtn");
    const interestsButton = document.getElementById("interestsBtn");

    function onButtonClick(type) {
        // Check if Ctrl was pressed first
        if (!ctrlPressed) {
            const warning = document.createElement("div");
            warning.innerText = "✨ Press Ctrl first to unlock the buttons ✨";
            warning.style.position = "fixed";
            warning.style.bottom = "30%";
            warning.style.left = "50%";
            warning.style.transform = "translateX(-50%)";
            warning.style.background = "#1a1a2ecc";
            warning.style.color = "#ffbbdd";
            warning.style.padding = "10px 24px";
            warning.style.borderRadius = "40px";
            warning.style.fontFamily = "monospace";
            warning.style.backdropFilter = "blur(8px)";
            warning.style.border = "1px solid #ff99bb";
            warning.style.zIndex = "1000";
            document.body.appendChild(warning);
            setTimeout(() => warning.remove(), 1500);
            return;
        }
        
        // Show the frame for this button type
        showFrame(type);
    }

    musicButton.addEventListener("click", () => onButtonClick("music"));
    gamesButton.addEventListener("click", () => onButtonClick("games"));
    interestsButton.addEventListener("click", () => onButtonClick("interests"));

    // Fix any image loading errors
    const allImages = document.querySelectorAll('.btn-logo');
    allImages.forEach(img => {
        img.addEventListener('error', function() {
            if (this.alt === 'spotify') this.src = 'https://upload.wikimedia.org/wikipedia/commons/thumb/8/84/Spotify_icon.svg/512px-Spotify_icon.svg.png';
            if (this.alt === 'roblox') this.src = 'https://cdn-icons-png.flaticon.com/512/5968/5968891.png';
            if (this.alt === 'netflix') this.src = 'https://upload.wikimedia.org/wikipedia/commons/0/08/Netflix_2015_logo.svg';
        });
    });

    // Ensure frame starts hidden
    slidingFrame.classList.remove("active");
    slidingFrame.classList.add("exit");
</script>
</body>
</html>
