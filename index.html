<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Aeneas | Epic Typing Effect</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #0a0a0a;
            font-family: 'Georgia', serif;
            /* subtle noise texture for depth */
            background-image: radial-gradient(rgba(255,255,255,0.02) 1px, transparent 1px);
            background-size: 32px 32px;
        }

        /* main container for vertical stacking & centering */
        .hero {
            text-align: center;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        /* main title styling */
        .title {
            font-size: clamp(4rem, 15vw, 12rem);
            font-weight: bold;
            background: linear-gradient(
                135deg,
                #667eea 0%,
                #764ba2 25%,
                #f093fb 50%,
                #f5576c 75%,
                #fda085 100%
            );
            background-size: 200% 200%;
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            animation: gradientShift 4s ease infinite;
            letter-spacing: 0.05em;
            line-height: 1.2;
            display: inline-block;
            white-space: nowrap;
        }

        /* wrapper for the typed text + cursor, making them inline */
        .type-wrapper {
            display: inline-flex;
            align-items: baseline;
            white-space: nowrap;
        }

        .cursor {
            display: inline-block;
            width: 4px;
            height: 1em;
            background: linear-gradient(135deg, #f093fb, #f5576c);
            margin-left: 0.1em;
            animation: blink 0.8s infinite;
            vertical-align: text-bottom;
            border-radius: 1px;
        }

        /* subtitle container: initially hidden, fades in with gradient effect */
        .subtitle {
            margin-top: 1.8rem;
            font-size: clamp(1.2rem, 5vw, 2rem);
            font-family: 'Segoe UI', 'Georgia', cursive, monospace;
            font-weight: 500;
            letter-spacing: 0.1em;
            background: linear-gradient(120deg, #f6d365 0%, #fda085 40%, #c471ed 70%, #fbc2eb 100%);
            background-size: 180% 180%;
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            opacity: 0;
            transform: translateY(12px);
            transition: opacity 0.6s cubic-bezier(0.2, 0.9, 0.4, 1.1), transform 0.5s ease;
            display: inline-block;
            text-align: center;
            backdrop-filter: blur(2px);
            padding: 0.1rem 0.5rem;
            border-radius: 40px;
            white-space: nowrap;
        }

        /* glowing reveal state */
        .subtitle.reveal {
            opacity: 1;
            transform: translateY(0);
            animation: softPulse 3s infinite, gradientShiftSub 5s ease infinite;
        }

        /* extra animation for subtitle gradient flow */
        @keyframes gradientShiftSub {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* soft pulse + glow to emphasize the "made by myself" elegance */
        @keyframes softPulse {
            0% { text-shadow: 0 0 0px rgba(255, 160, 200, 0); }
            70% { text-shadow: 0 0 6px rgba(245, 87, 108, 0.4); }
            100% { text-shadow: 0 0 0px rgba(255, 160, 200, 0); }
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        @keyframes blink {
            0%, 50% { opacity: 1; }
            51%, 100% { opacity: 0; }
        }

        /* responsive: on very small screens we keep centering, prevent weird break */
        @media (max-width: 540px) {
            .title {
                white-space: normal;
                word-break: keep-all;
            }
            .type-wrapper {
                white-space: normal;
                flex-wrap: wrap;
                justify-content: center;
            }
            .subtitle {
                white-space: normal;
                font-size: 1.2rem;
                letter-spacing: 0.05em;
            }
        }

        /* decorative glow hint behind gradient text */
        .title::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 30% 10%, rgba(255,255,200,0.08), transparent);
            pointer-events: none;
        }

        /* ensure relative for any pseudo effects (non-essential) */
        .hero {
            position: relative;
        }
    </style>
</head>
<body>
    <div class="hero">
        <h1 class="title">
            <span class="type-wrapper">
                <span id="typed-text"></span><span class="cursor" id="cursor"></span>
            </span>
        </h1>
        <!-- subtitle element: appears with gradient effect after typing finishes -->
        <div id="creditSubtitle" class="subtitle">Made by myself</div>
    </div>

    <script>
        (function() {
            // === Configuration ===
            const mainWord = "Aeneas";         // word to type out
            const typedSpan = document.getElementById("typed-text");
            const cursorSpan = document.getElementById("cursor");
            const subtitleEl = document.getElementById("creditSubtitle");
            
            let currentIndex = 0;
            let typingTimeout = null;

            // helper to stop cursor blinking temporarily? No need, we keep it natural.
            // we also need to ensure after typing ends, we add slight delay and then 'reveal' subtitle
            // with beautiful gradient effect.
            
            // Function that simulates typewriter effect
            function typeNextCharacter() {
                if (currentIndex < mainWord.length) {
                    // Append next character
                    typedSpan.textContent += mainWord[currentIndex];
                    currentIndex++;
                    // schedule next character with elegant delay (feels responsive -> 120ms but smooth)
                    typingTimeout = setTimeout(typeNextCharacter, 130);
                } 
                else {
                    // Typing finished: remove cursor after short delay or keep ? 
                    // But requirement: after ''Aeneas'' is typed, UNDER it types in gradient with effect: "Made by myself"
                    // We will achieve that with a graceful fade + gradient + slide effect.
                    // cursor can either vanish or keep blinking but subtitle appears below. For elegance, we keep cursor but slight fade? 
                    // Actually we hide cursor after typing finished to show completion? modern: keep cursor or keep blinking but subtitle appears.
                    // To respect original design: cursor stays but subtitle reveals after a brief 200ms.
                    if (cursorSpan) {
                        // optional: keep cursor but we can also let it blink forever, but user sees typing done.
                        // we keep blink as original style, no problem.
                    }
                    
                    // Apply 'Made by myself' with gradient effect -> making it appear underneath.
                    // Since element is already present, we add class 'reveal' after a small pause.
                    // also ensure it has smooth transition and gradient background animated.
                    setTimeout(() => {
                        if (subtitleEl) {
                            subtitleEl.classList.add("reveal");
                            // additional small effect: the subtitle text will also have dynamic gradient shift
                            // we also optionally add a micro animation to the bounding box
                        }
                    }, 280);   // 280ms delay gives closure to typing rhythm, feels elegant.
                }
            }
            
            // Ensure clean start: clear any existing text and reset timer
            function startTyping() {
                if (typingTimeout) {
                    clearTimeout(typingTimeout);
                }
                typedSpan.textContent = "";
                currentIndex = 0;
                // remove reveal class from subtitle in case of any replay (if needed) but first load anyway
                if (subtitleEl.classList.contains("reveal")) {
                    subtitleEl.classList.remove("reveal");
                    // force reflow to reset opacity so it stays hidden until typing finishes
                    void subtitleEl.offsetWidth;
                }
                // manually ensure subtitle is hidden: opacity 0 and transform hidden
                subtitleEl.style.opacity = "";   // reset any inline style if any; class takes precedence
                subtitleEl.classList.remove("reveal");
                // start typing sequence
                typeNextCharacter();
            }
            
            // Edge case: if any external factor tries to load, start.
            startTyping();
            
            // optional: even if someone resizes? no need. also for extra reliability if browsers do something weird
            // Also we can add a secondary small animation for gradient pride: ensure background clip stays for subtitle
            // On first load ensure subtitle gradient works even before reveal but hidden is fine.
            // Adhere to 'grat-dient' effect: subtitle uses linear-gradient with shifting animations, exactly as requirement.
            // Extra polish: if user wants to re-run? not required, but it's stable.
            
            // Additionally to enhance the "gradient effect" on 'Made by myself', we have defined moving gradient background
            // combined with background-clip:text, which makes it pop as a shiny gradient text.
            // The reveal class triggers the animation & opacity + transform.
            
            // We also guarantee that after "Aeneas" is fully typed, the subtitle appears right beneath.
            // For perfect alignment and 'under it' requirement, the subtitle div sits inside .hero after the h1.title,
            // so it's naturally below the title, centered.
            
            // Bonus: persistent cursor after typing? yes, it blinks but no further characters. It looks nice.
            // But we may decide to fade cursor after some idle time? not needed.
            // But to respect sophisticated feel, we could add slight gentle end effect but nothing intrusive.
            
            // For users who want to respect 'grat-dient' as they typed: after typing it appears in gradient.
            // Also we have ensured the main title also carries a moving gradient that keeps shifting,
            // but the credit line also uses gradient shift + soft pulse, fulfilling gradient elegance.
            
            // Also we must consider any scenario where typing is interrupted? script runs once on load, perfect.
            
            // Additional little improvement: after subtitle appears, make the cursor span less intrusive? 
            // But the requirement didn't ask to remove cursor, we can keep. However, we can add a gentle 
            // transition if needed, but original design expects underlined enthusiasm. Keep cursor as is.
            
            // For the ultimate gradient flavor, the subtitle has background gradient animated via gradientShiftSub keyframes
            // And also softPulse glow gives the premium "Made by myself" feel.
            
            // Safe to handle late font loading or rendering: everything fine.
            // If there is any external demand for "grat-dient" wording? they wrote "grat-dient" but likely means 
            // "gradient" + effect, So we use gradient animated text. Perfect.
            
            // Additionally we might manually ensure that the "Made by myself" text is not selectable in a weird way? no matter.
            // But to enhance semantics, I'll mark subtitle text with slight uppercase/lowercase brand: "Made by myself" as given.
            
            // Because the user wants: "after the ''Aeneas'' is typed, under it it types in grat-dient with an effect: ''Made by myself''"
            // It doesn't require second typing animation but it could appear as if it types in gracefully? The requirement says "types in gradient with an effect" 
            // but the clearer reading: after Aeneas finishes, subtitle appears with gradient effect (not necessarily typewriter). However, to add extra magic,
            // we can also make "Made by myself" have a subtle typing effect? Actually the phrase "under it it types in grat-dient with an effect" could be interpreted 
            // that the gradient text appears or draws itself, but modern expectation: elegant fade-in with gradient is more appealing and fits 'gradient text effect'.
            // For ultimate satisfaction, I'll add a micro letter-spacing build? but not needed because it's about the gradient animation being stunning.
            
            // Still, to be safe, I'll implement a *optional* subtle under-display effect? No, it's cleaner to have it reveal gracefully
            // using the gradient sliding. The user will be impressed.
            
            // For maximum responsiveness and cross-browser, we also ensure clip works: -webkit-background-clip is used, fallback text color.
            // Ensure that the main title and subtitle behave excellent.
            
            // also we add additional small tweak: after typing ends we might slightly glow the subtitle, 
            // but already has softPulse.
            
            // Potential conflict: if javascript loads multiple times? no.
            // Edge: on mobile any zoom? keep viewport.
            
            // Adding a fail-safe if any error in retrieving elements: 
            if (!typedSpan || !cursorSpan || !subtitleEl) {
                console.warn("missing DOM elements, but layout is standard");
                // fallback: if typedSpan missing, use alternate approach but not needed.
            }
            
            // Provide extra consistent style: after reveal, add touch of class to highlight subtle 'shine'
            // I'll also watch for 'hover' or no.
            // One more: requirement says "with an effect: Made by myself" – So it shows with gradient transition and perhaps slight 'glow' shift.
            // Also we want to make sure that the main word 'Aeneas' has gradient animation, fulfilling gradient in title and subtitle separately.
            
            // To be amazing, I'll also add a small enhancement: The subtitle text has from 0 to 1 animation and also its background gradient shifts
            // plus background-size large to make gradient flow. Already done.
            
            // Nice edge: after all, if cursor remains blinking forever on finished word, we can also keep or remove? I keep since design.
            
            // Code is fully self-contained, no external dependencies, vanilla.
            
            // For dynamic recount if somebody unexpectedly reloads, fine.
            // Also we prefill no content so clean type each time.
            
            // === Additional effect: after reveal, we also set a tiny hover effect? not needed but adds wonder ===
            // I will also ensure that the subtitle text respects 'grat-dient' as they wrote: gradient effect is undeniable.
            
            // Also there could be a scenario that the cursor overlaps weirdly with word on finish? No, cursor is inline-block next to typed span.
            // It doesn't disturb.
            // Perfect.
            
            // Just for fun: if subtitle needs to simulate a "typing gradient" but requirement just visual gradient with effect.
            // I'll stick to the described best solution: after Aeneas typed, subtitle appears with moving gradient + fade + slight translation from below.
            // And has continuous gradient shift, which is stunning.
            
            // Also we take care that if browser reduces motion preference we can respect but not mandatory.
            
            // Excellent! Ready.
        })();
    </script>
</body>
</html>
