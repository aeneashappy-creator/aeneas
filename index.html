<script>
    // first text (your name)
    const text1 = "Aeneas";
    const element1 = document.getElementById("text");
    let index1 = 0;

    function typeTitle() {
        if (index1 < text1.length) {
            element1.textContent += text1[index1];
            index1++;
            setTimeout(typeTitle, 150);
        }
    }

    typeTitle();

    // second text (on scroll)
    const text2 = "Made by myself because I was bored";
    const element2 = document.getElementById("aboutText");
    let index2 = 0;
    let started = false;

    function typeSecond() {
        if (index2 < text2.length) {
            element2.textContent += text2[index2];
            index2++;
            setTimeout(typeSecond, 50);
        }
    }

    // trigger when visible
    const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
            if (entry.isIntersecting && !started) {
                started = true;
                typeSecond();
            }
        });
    });

    observer.observe(element2);
</script>
